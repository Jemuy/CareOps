                  $ref: "#/components/schemas/Policy"
    post:
      operationId: createPolicy
      tags: [governance]
      summary: Add a policy record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyInput"
      responses:
        "201":
          description: Created policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"

  /governance/summary:
    get:
      operationId: getGovernanceSummary
      tags: [governance]
      summary: Get governance domain summary
      responses:
        "200":
          description: Governance summary
          content:
            application/json:
              schema:
