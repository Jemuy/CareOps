openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CareOps AI - Inspection Readiness Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Master dashboard and readiness scores
  - name: alerts
    description: Critical alert engine
  - name: children
    description: Children and young people management
  - name: staff
    description: Workforce and staff management
  - name: safeguarding
    description: Safeguarding events and concerns
  - name: training
    description: Training and supervision records
  - name: regulation
    description: Regulation 44 and 45 tracking
  - name: governance
    description: Governance, complaints, and notifications
  - name: incidents
    description: Incident recording and management
  - name: inspection
    description: Inspection mode and pack generation

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── DASHBOARD ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall inspection readiness summary
      responses:
        "200":
          description: Dashboard summary with domain scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: List of recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── ALERTS ─────────────────────────────────────────────────────────────────
  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: List all active alerts
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: domain
          in: query
          schema:
            type: string
        - name: resolved
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get alert detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found

    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Update alert (resolve, assign, add note)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/counts:
    get:
      operationId: getAlertCounts
      tags: [alerts]
      summary: Get alert counts by severity and domain
      responses:
        "200":
          description: Alert count summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertCounts"

  # ── CHILDREN ───────────────────────────────────────────────────────────────
  /children:
    get:
      operationId: listChildren
      tags: [children]
      summary: List all young people in the home
      responses:
        "200":
          description: List of children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Child"
    post:
      operationId: createChild
      tags: [children]
      summary: Add a new young person
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChildInput"
      responses:
        "201":
          description: Created child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"

  /children/{id}:
    get:
      operationId: getChild
      tags: [children]
      summary: Get young person detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "404":
          description: Not found

    patch:
      operationId: updateChild
      tags: [children]
      summary: Update young person record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChildUpdate"
      responses:
        "200":
          description: Updated child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"

  /children/{id}/outcomes:
    get:
      operationId: getChildOutcomes
      tags: [children]
      summary: Get outcome tracking for a young person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child outcomes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Outcome"
    post:
      operationId: createOutcome
      tags: [children]
      summary: Record an outcome update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutcomeInput"
      responses:
        "201":
          description: Created outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Outcome"

  /children/{id}/voice:
    get:
      operationId: getChildVoice
      tags: [children]
      summary: Get child voice evidence for a young person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child voice records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChildVoice"
    post:
      operationId: createChildVoiceRecord
      tags: [children]
      summary: Record a child voice entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChildVoiceInput"
      responses:
        "201":
          description: Created child voice record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChildVoice"

  /children/outcomes/summary:
    get:
      operationId: getOutcomesSummary
      tags: [children]
      summary: Get aggregated outcomes summary across all children
      responses:
        "200":
          description: Outcomes summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomesSummary"

  # ── STAFF ──────────────────────────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: Staff list
          content:
