  # ── INSPECTION MODE ────────────────────────────────────────────────────────
  /inspection/pack:
    get:
      operationId: getInspectionPack
      tags: [inspection]
      summary: Generate inspection readiness pack
      responses:
        "200":
          description: Full inspection pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionPack"

  /inspection/annex-a:
    get:
      operationId: getAnnexA
      tags: [inspection]
      summary: Generate Annex A data
      responses:
        "200":
          description: Annex A data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnexA"

  /inspection/evidence-gaps:
    get:
      operationId: getEvidenceGaps
      tags: [inspection]
      summary: Get current evidence gaps analysis
      responses:
        "200":
          description: Evidence gaps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvidenceGap"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── DASHBOARD ────────────────────────────────────────────────────────────
    DomainScore:
      type: object
      required: [domain, score, label, trend, alertCount]
      properties:
        domain:
          type: string
        label:
          type: string
        score:
          type: integer
        trend:
          type: string
          enum: [up, down, stable]
        alertCount:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high, critical]

    DashboardSummary:
      type: object
      required: [overallScore, domains, criticalAlerts, overdueActions, lastUpdated]
      properties:
        overallScore:
          type: integer
        domains:
          type: array
          items:
            $ref: "#/components/schemas/DomainScore"
        criticalAlerts:
          type: integer
        overdueActions:
          type: integer
        totalChildren:
          type: integer
        totalStaff:
          type: integer
        lastUpdated:
          type: string

    ActivityItem:
      type: object
      required: [id, type, description, timestamp, domain]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        timestamp:
          type: string
        domain:
          type: string
        severity:
          type: ["string", "null"]
          enum: [critical, high, medium, low, null]
        relatedEntityType:
          type: ["string", "null"]
        relatedEntityId:
          type: ["integer", "null"]

    # ── ALERTS ───────────────────────────────────────────────────────────────
    Alert:
      type: object
      required: [id, title, description, severity, domain, riskExplanation, regulatoryImpact, recommendedAction, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
