          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [current, expiring_soon, expired]
      responses:
        "200":
          description: Training records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingRecord"
    post:
      operationId: createTrainingRecord
      tags: [training]
      summary: Record a training completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingInput"
      responses:
        "201":
          description: Created training record
          content:
            application/json:
              schema:
