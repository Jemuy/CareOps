kind = "web"
previewPath = "/"
title = "CareOps AI"
version = "1.0.0"
id = "artifacts/careops-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25688

[services.development]
run = "pnpm --filter @workspace/careops-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/careops-ai", "run", "build" ]
publicDir = "artifacts/careops-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25688"
BASE_PATH = "/"
